<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Flask Demo</title>
    <style>
      :root {
        --bg: #f4f7fb;
        --card: #ffffff;
        --text: #1f2937;
        --accent: #0f766e;
      }

      * {
        box-sizing: border-box;
      }

      body {
        margin: 0;
        min-height: 100vh;
        display: grid;
        place-items: center;
        font-family: "Segoe UI", Tahoma, Geneva, Verdana, sans-serif;
        background: linear-gradient(135deg, #e0f2fe, var(--bg));
        color: var(--text);
      }

      .card {
        width: min(92vw, 520px);
        background: var(--card);
        border-radius: 16px;
        padding: 28px;
        box-shadow: 0 12px 30px rgba(2, 6, 23, 0.12);
      }

      h1 {
        margin: 0 0 12px;
        font-size: 1.7rem;
      }

      p {
        margin: 0;
        line-height: 1.5;
      }

      .badge {
        display: inline-block;
        margin-top: 14px;
        padding: 6px 10px;
        border-radius: 999px;
        background: #ccfbf1;
        color: var(--accent);
        font-weight: 600;
        font-size: 0.85rem;
      }
    </style>
  </head>
  <body>
    <main class="card">
      <h1>Small Flask App</h1>
      <p>Your Flask app is running and serving this HTML template.</p>
      <span class="badge">Route: /</span>
    </main>
  </body>
</html>
