#Linting and SAST Scan
#lint -flask & SAST -Bandit

name: Code Quality

on:
    workflow_call:


jobs:
    validate:
        runs-on: ubuntu-latest
        strategy:
            fail-fast: false
            matrix:
                python-version: ["3.9","3.10","3.11"]
        steps:
            - name: Checkout code
              uses: actions/checkout@v4

            - name: Setup Python
              uses: actions/setup-python@v5
              with:
                python-version: "3.13"

            - name: Install dependencies
              run: |
               python -m pip install --upgrade pip
               pip install -r .github/requirements.txt flake8

            - name: Run linter
              run: flake8 .github/app.py

            - name: run SAST
              run: bandit -r app.py